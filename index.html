<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Abridora Movil</title>
    <link rel="stylesheet" href="css/abridora-mobile.css">
</head>
<body>
    <main class="mobile-shell">
        <section class="mobile-card">
            <form id="abridora-mobile-search-form" class="stack-gap" autocomplete="off">
                <label class="field-label" for="abridora-mobile-search">OP-PTDA</label>
                <div class="search-row">
                    <input
                        id="abridora-mobile-search"
                        class="mobile-input"
                        type="tel"
                        inputmode="tel"
                        maxlength="18">
                    <button type="submit" class="primary-button mobile-icon-button" aria-label="Buscar" title="Buscar">
                        <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
                            <path d="M10.75 4a6.75 6.75 0 1 0 0 13.5 6.75 6.75 0 0 0 0-13.5Zm-8.25 6.75a8.25 8.25 0 1 1 14.59 5.28l4.19 4.19a.75.75 0 1 1-1.06 1.06l-4.19-4.19A8.25 8.25 0 0 1 2.5 10.75Z"></path>
                        </svg>
                    </button>
                    <button type="button" id="abridora-mobile-scan-button" class="primary-button mobile-icon-button mobile-scan-button" aria-label="Escanear QR" title="Escanear QR">
                        <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
                            <path d="M4 4h6v6H4V4Zm1.5 1.5v3h3v-3h-3ZM14 4h6v6h-6V4Zm1.5 1.5v3h3v-3h-3ZM4 14h6v6H4v-6Zm1.5 1.5v3h3v-3h-3ZM14 14h2.5v1.5H15.5v1H14V14Zm4 0h2v3.5h-1.5v-2H18V14Zm-2.5 4H17v2h-3v-1.5h1.5V18Zm3.5 0h1.5v2H19v-2Z"></path>
                        </svg>
                    </button>
                </div>
            </form>
            <p class="status-line" id="abridora-mobile-sync-status">Cargando datos...</p>
        </section>

        <section class="mobile-card">
            <div class="section-head">
                <div>
                    <h2>Resultados</h2>
                    <p class="section-copy" id="abridora-mobile-result-summary">Ingresa una OP-PTDA para comenzar.</p>
                </div>
                <button type="button" id="abridora-mobile-select-all" class="ghost-button section-action-button hidden">Seleccionar todo</button>
            </div>
            <div id="abridora-mobile-results" class="result-list">
                <div class="empty-state">Ingresa una OP-PTDA para ver coincidencias exactas.</div>
            </div>
        </section>

        <section class="mobile-card hidden" id="abridora-mobile-form-card">
            <div class="section-head section-head-form">
                <h2>Registro</h2>
                <label class="inline-field-group inline-field-group-turno" for="abridora-mobile-turno">
                    <span class="field-label">Turno</span>
                    <input id="abridora-mobile-turno" class="mobile-input inline-turno-input" type="text" readonly>
                </label>
            </div>
            <p class="section-copy" id="abridora-mobile-selection-summary"></p>

            <div class="form-grid">
                <label class="field-group">
                    <span class="field-label">Proceso</span>
                    <select id="abridora-mobile-proceso" class="mobile-select">
                        <option value="">Seleccionar...</option>
                        <option value="DOBLADO+COSIDO">DOBLADO+COSIDO</option>
                        <option value="ABIERTO">ABIERTO</option>
                        <option value="DOB+COS-REPROCESO" style="color:#b91c1c;font-weight:700;">DOB+COS-REPROCESO</option>
                        <option value="ABIERTO-REPROCESO" style="color:#b91c1c;font-weight:700;">ABIERTO-REPROCESO</option>
                    </select>
                </label>
                <label class="field-group">
                    <span class="field-label">Operario</span>
                    <input
                        id="abridora-mobile-operario"
                        class="mobile-input"
                        type="text"
                        placeholder="Ej: JUAN PEREZ"
                        autocomplete="off">
                </label>
            </div>

            <div class="mobile-action-row">
                <button type="button" id="abridora-mobile-inicio" class="primary-button abridora-inicio-button">INICIO</button>
                <button type="button" id="abridora-mobile-fin" class="primary-button abridora-fin-button">FIN</button>
            </div>
        </section>
    </main>

    <div id="abridora-mobile-toast" class="toast hidden" role="status" aria-live="polite"></div>

    <!-- Modal: siguiente paso al presionar FIN -->
    <div id="abridora-fin-modal" class="fin-modal-overlay hidden" role="dialog" aria-modal="true" aria-label="Siguiente paso">
        <div class="fin-modal-card">
            <p class="fin-modal-eyebrow">Al terminar en Abridora</p>
            <h3 class="fin-modal-title">¿Cuál es el siguiente proceso?</h3>
            <div class="fin-modal-options">
                <button type="button" class="fin-modal-btn fin-modal-btn-rama" id="abridora-fin-opt-rama">
                    RAMA ACABADO
                </button>
                <button type="button" class="fin-modal-btn fin-modal-btn-secado" id="abridora-fin-opt-secado">
                    SECADO
                </button>
            </div>
            <button type="button" class="fin-modal-cancel" id="abridora-fin-modal-cancel">Cancelar</button>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/qr-scanner.js"></script>
    <script src="js/abridora-mobile.js"></script>
</body>
</html>
